# Railway / Nixpacks — monorepo backend deploy (root directory MUST be repo root, not backend/)
# Do NOT set a custom Build Command in Railway UI that runs npm ci again — install phase already does it.
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
dependsOn = ["setup"]
# devDependencies needed for TypeScript build (tsc, nest-cli)
cmds = ["npm ci --include=dev"]

[phases.build]
dependsOn = ["install"]
cmds = [
  "npm run build:packages",
  "npm run build -w @logo-platform/backend",
]

[start]
cmd = "npm run start -w @logo-platform/backend"

[variables]
NODE_ENV = "production"
