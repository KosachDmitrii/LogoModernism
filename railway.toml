# Railway service config — set Root Directory to "/" (repository root).
# Do NOT set Root Directory to backend/ or frontend/ (workspace packages live in packages/).
#
# Frontend (second service, also Root Directory = "/"):
#   Build:  npm run build -w @logo-platform/frontend
#   Start:  npm run preview -w @logo-platform/frontend -- --host 0.0.0.0 --port $PORT
#   Env:    VITE_API_URL=https://logomodernism-production.up.railway.app/api
#           FRONTEND_URL=https://<frontend-host>  (on backend service)
#           CORS_ORIGINS=https://<frontend-host>,http://localhost:5173
#
# Persistent data (Railway dashboard → backend service → Volumes):
#   Mount path: /app/persistent
#   Stores: PDF uploads, generated logos, research candidates
#   Catalog (data/catalog-pipeline) stays in the repo image — do NOT mount over /app/data

[build]
builder = "nixpacks"
# install runs once in nixpacks.toml [phases.install] — do NOT add npm ci here (causes EBUSY on node_modules/.cache)
buildCommand = "npm run build:packages && npm run build -w @logo-platform/backend"

[deploy]
startCommand = "npm run start -w @logo-platform/backend"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
