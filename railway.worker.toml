# Create this as a separate Railway service from the same repository.
# Share API environment variables, including REDIS_URL, DATABASE_POOLER_URL,
# DIRECT_URL, provider API keys, and QUEUE_ASYNC_ENABLED=true.
[build]
builder = "nixpacks"
buildCommand = "npm run build:packages && npm run build -w @logo-platform/backend"

[deploy]
startCommand = "npm run start:worker -w @logo-platform/backend"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
